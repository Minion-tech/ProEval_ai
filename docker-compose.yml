services:
  postgres:
    image: postgres:16-alpine
    container_name: proeval-postgres
    environment:
      POSTGRES_DB: proeval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - proeval_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proeval"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proeval-redis
    ports:
      - "6379:6379"
    volumes:
      - proeval_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: proeval-backend
    env_file:
      - ./backend/.env.docker.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    container_name: proeval-worker
    env_file:
      - ./backend/.env.docker.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app.celery_app worker
      --loglevel=info
      --concurrency=3

volumes:
  proeval_postgres_data:
  proeval_redis_data:
